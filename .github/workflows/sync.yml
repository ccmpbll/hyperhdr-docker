name: Sync HyperHDR Releases

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Get latest HyperHDR releases
        id: upstream
        run: |
          gh api "repos/awawa-dev/HyperHDR/releases?per_page=5" \
            --jq '.[].tag_name' | sed 's/^v//' > upstream_tags.txt
          echo "Upstream tags:"
          cat upstream_tags.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get existing Docker Hub tags
        run: |
          curl -s "https://hub.docker.com/v2/repositories/${{ vars.DOCKERHUB_USERNAME }}/hyperhdr/tags?page_size=100" \
            | jq -r 'if .results then .results[].name else empty end' > existing_tags.txt || true
          echo "Existing tags:"
          cat existing_tags.txt

      - name: Determine missing tags and latest stable
        id: diff
        run: |
          comm -23 <(sort upstream_tags.txt) <(sort existing_tags.txt) > missing_tags.txt
          echo "Tags to build:"
          cat missing_tags.txt

          LATEST_STABLE=$(grep -v -i 'beta\|rc' upstream_tags.txt | head -1)
          echo "Latest stable: ${LATEST_STABLE}"

          echo "tags=$(cat missing_tags.txt | tr '\n' ' ' | xargs)" >> $GITHUB_OUTPUT
          echo "latest_stable=${LATEST_STABLE}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        if: steps.diff.outputs.tags != ''
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.diff.outputs.tags != ''
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: steps.diff.outputs.tags != ''
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.diff.outputs.tags != ''
        run: |
          LATEST_STABLE="${{ steps.diff.outputs.latest_stable }}"
          for tag in $(cat missing_tags.txt); do
            echo "Building hyperhdr:${tag}"
            EXTRA_TAGS=""
            if [ "${tag}" = "${LATEST_STABLE}" ]; then
              EXTRA_TAGS="--tag ${{ vars.DOCKERHUB_USERNAME }}/hyperhdr:latest"
            fi
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --build-arg HYPERHDR_VERSION=${tag} \
              --tag ${{ vars.DOCKERHUB_USERNAME }}/hyperhdr:${tag} \
              ${EXTRA_TAGS} \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              --push .
          done
